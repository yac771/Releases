<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OmniScreen - Création de compte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 15px;
        }
        .login-box {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-top: 5px solid #10b981; /* Success Green for Register */
        }
        .logo-text {
            font-size: 36px;
            font-weight: 800;
            color: #0f172a;
            text-align: center;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }
        .logo-text span {
            color: #3b82f6;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-control {
            background-color: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 15px;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
        .btn-success {
            background-color: #10b981;
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn-success:hover {
            background-color: #059669;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <div class="logo-text">Omni<span>Screen</span></div>
            <div class="subtitle">Initialisation de votre CMS</div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{% if category == 'success' %}success{% else %}danger{% endif %} alert-dismissible fade show" role="alert" style="font-size:14px; border-radius:8px;">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="/register">
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px; font-weight: 600; color: #475569;">Nouvel identifiant admin</label>
                    <input type="text" class="form-control" name="username" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label" style="font-size: 13px; font-weight: 600; color: #475569;">Nouveau mot de passe</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
                <button type="submit" class="btn btn-success w-100 mb-3">Créer l'instance</button>
            </form>
            
            <div class="text-center mt-3 pt-3 border-top">
                <a href="/login" style="font-size: 14px; color: #64748b; text-decoration: none; font-weight: 500;">&larr; Retour à la connexion</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
