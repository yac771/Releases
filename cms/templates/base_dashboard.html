<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OmniScreen - {% block title %}CMS{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        .sidebar { background-color: #0f172a; min-height: 100vh; padding-top: 20px; color: #fff; }
        .sidebar-brand { font-size: 24px; font-weight: 800; letter-spacing: -1px; padding: 10px 25px 30px; }
        .sidebar-brand span { color: #3b82f6; }
        .sidebar-item { color: #94a3b8; padding: 12px 25px; display: block; text-decoration: none; font-weight: 500; font-size: 14px; border-left: 3px solid transparent; transition: all 0.2s; }
        .sidebar-item:hover, .sidebar-item.active { background-color: #1e293b; color: #fff; border-left-color: #3b82f6; }
        .sidebar-item i { width: 25px; color: #64748b; }
        .sidebar-item.active i { color: #3b82f6; }
        .user-profile { padding: 20px 25px; background: #1e293b; margin-bottom: 20px; display: flex; align-items: center; }
        .user-avatar { width: 40px; height: 40px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; margin-right: 15px; }
        .page-header { background: #ffffff; padding: 20px 30px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .page-title h2 { margin: 0; font-size: 22px; font-weight: 700; color: #1e293b; }
        .page-title p { margin: 0; color: #64748b; font-size: 13px; font-weight: 500; }
        .content-area { padding: 30px; }
        .card-box { background: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 20px; padding: 20px; }
        .btn-primary { background: #3b82f6; border: none; font-weight: 600; padding: 8px 16px; border-radius: 8px; }
        .btn-primary:hover { background: #2563eb; }
        .table th { border-top: none; color: #64748b; font-weight: 600; font-size: 13px; text-transform: uppercase; padding: 15px 20px; }
        .table td { padding: 15px 20px; vertical-align: middle; color: #334155; font-size: 14px; font-weight: 500; border-bottom: 1px solid #e2e8f0; }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="d-flex">
        <div class="sidebar" style="width: 260px; flex-shrink: 0;">
            <div class="sidebar-brand">Omni<span>Screen</span></div>
            <div class="user-profile">
                <div class="user-avatar">{{ user.username[0]|upper }}</div>
                <div><div style="font-weight: 700; font-size: 14px;">{{ user.username }}</div><div style="color: #64748b; font-size: 12px;">Administrateur</div></div>
            </div>
            <a href="/dashboard" class="sidebar-item {% if active_page == 'dashboard' %}active{% endif %}"><i class="fa fa-chart-pie"></i> Vue d'ensemble</a>
            <a href="/displays" class="sidebar-item {% if active_page == 'displays' %}active{% endif %}"><i class="fa fa-tv"></i> Écrans (Players)</a>
            <a href="/schedule" class="sidebar-item {% if active_page == 'schedule' %}active{% endif %}"><i class="fa fa-calendar-alt"></i> Planification</a>
            <a href="/media" class="sidebar-item {% if active_page == 'media' %}active{% endif %}"><i class="fa fa-photo-video"></i> Bibliothèque Médias</a>
            <a href="/settings" class="sidebar-item {% if active_page == 'settings' %}active{% endif %}"><i class="fa fa-cog"></i> Paramètres</a>
        </div>

        <div style="flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow-y: auto;">
            <div class="page-header">
                <div class="page-title">
                    <h2>{% block header_title %}Titre{% endblock %}</h2>
                    <p>{% block header_subtitle %}Sous-titre{% endblock %}</p>
                </div>
                <div><a href="/logout" class="btn btn-light" style="border: 1px solid #e2e8f0; font-weight: 600; color: #ef4444; border-radius: 8px;"><i class="fa fa-sign-out-alt"></i> Déconnexion</a></div>
            </div>
            <div class="content-area">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
