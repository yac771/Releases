name: Build and Release OmniScreen

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 📥 Telechargement du code source
      uses: actions/checkout@v4

    - name: 🐍 Installation de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 🔧 Renommage des fichiers (Si traduits par le navigateur)
      shell: powershell
      run: |
        if (Test-Path "lanceur.py") { Rename-Item "lanceur.py" "launcher.py" --add-data "omni_updater.py;." -Force }
        if (Test-Path "configuration.iss") { Rename-Item "configuration.iss" "setup.iss" -Force }
        if (Test-Path "joueur") { Rename-Item "joueur" "player" -Force }

    - name: 📦 Installation des modules (pip)
      shell: powershell
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller Pillow

    - name: 🎨 Creation d'une icone via Python
      shell: powershell
      run: |
        # Pour eviter les plantages de convertisseurs externes, on cree l'icone .ico 
        # directement avec du code Python natif sur la machine (Pillow) !
        python -c "
        from PIL import Image, ImageDraw
        img = Image.new('RGBA', (256, 256), (0,0,0,0))
        d = ImageDraw.Draw(img)
        # Cercle exterieur bleu fonce
        d.ellipse([10, 10, 246, 246], fill='#0f172a')
        # Cercle bleu clair
        d.ellipse([50, 50, 206, 206], fill='#3b82f6')
        # Triangle Play Blanc
        d.polygon([(100, 80), (180, 128), (100, 176)], fill='white')
        img.save('icon.ico', format='ICO', sizes=[(256, 256)])
        "

    - name: 🔨 Compilation de l'Executable
      shell: powershell
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "OmniScreen" --icon "icon.ico" --hidden-import PyQt5.QtWebEngineWidgets --add-data "cms/templates;cms/templates" --add-data "version.txt;." "launcher.py" --add-data "omni_updater.py;."
        
    - name: 📁 Copie des dossiers de configuration
      shell: powershell
      run: |
        mkdir "dist\OmniScreen\config"
        xcopy /E /I /Y "player\config\*" "dist\OmniScreen\config\"

    - name: 💿 Creation de l'Installeur (Inno Setup)
      shell: powershell
      run: |
        iscc setup.iss

    - name: 🚀 Lecture de la version
      id: get_version
      shell: powershell
      run: |
        $version = Get-Content version.txt
        $version = $version.Trim()
        echo "VERSION=$version" >> $env:GITHUB_ENV

    - name: 🌐 Publication de la Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        name: OmniScreen Mise a jour v${{ env.VERSION }}
        files: InstallerFinal/OmniScreen_Setup_v2.4.0.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
