name: Build and Release OmniScreen

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 📥 Telechargement du code source
      uses: actions/checkout@v4

    - name: 🐍 Installation de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 🔧 Renommage des fichiers (Si traduits par le navigateur)
      shell: powershell
      run: |
        if (Test-Path "lanceur.py") { Rename-Item "lanceur.py" "launcher.py" -Force }
        if (Test-Path "configuration.iss") { Rename-Item "configuration.iss" "setup.iss" -Force }
        if (Test-Path "joueur") { Rename-Item "joueur" "player" -Force }

    - name: 📦 Installation des modules (pip)
      shell: powershell
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: 🔨 Compilation de l'Executable
      shell: powershell
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "OmniScreen" --hidden-import PyQt5.QtWebEngineWidgets --add-data "cms/templates;cms/templates" --add-data "version.txt;." "launcher.py"
        
    - name: 📁 Copie des dossiers de configuration
      shell: powershell
      run: |
        mkdir "dist\OmniScreen\config"
        xcopy /E /I /Y "player\config\*" "dist\OmniScreen\config\"

    - name: 💿 Creation de l'Installeur (Inno Setup)
      shell: powershell
      run: |
        iscc setup.iss

    - name: 🚀 Lecture de la version
      id: get_version
      shell: powershell
      run: |
        $version = Get-Content version.txt
        $version = $version.Trim()
        echo "VERSION=$version" >> $env:GITHUB_ENV

    - name: 📝 Creation du Patch Note (Release Notes)
      shell: powershell
      run: |
        $notes = @"
        # 🚀 OmniScreen - Version v${env:VERSION}

        ## 🌟 Nouvelles Fonctionnalités Majeures
        * **Mode "Réseau Local" (Remote Mobile Control) :** Contrôlez vos affichages depuis votre Smartphone ou Tablette connecté au même réseau WiFi !
        * **Téléchargement YouTube Intégré :** Un nouveau module permet de télécharger n'importe quelle vidéo YouTube en MP4 directement dans votre bibliothèque locale.
        * **Menu Coulissant "Responsive" :** L'interface CMS est désormais parfaitement adaptée aux mobiles avec un menu hamburger coulissant.
        * **Bandeau d'Actualités (Ticker RSS) :** Le Player affiche un bandeau noir en bas de l'écran diffusant les actualités en continu.
        * **Boutique Premium & Monétisation :** Intégration d'une page d'abonnement PayPal, avec encarts publicitaires.
        * **Transitions d'Affichage Pro :** Effet "Fondu au Noir" fluide (Fade In/Out) entre les changements de médias sur les écrans.

        ## ⚙️ Améliorations de l'Architecture
        * **Lanceur Multi-Tâches :** Le CMS et le Player tournent désormais dans des processus isolés. Lancez-les en même temps sans conflit mémoire.
        * **Auto-Updater Visuel :** Fini les Mises à jour bloquantes ! L'application affiche désormais une vraie barre de progression lors du téléchargement d'une update.
        * **Nouvel Écran de Veille (Player) :** "En attente de contenu..." s'affiche avec élégance si la boucle de médias est vide.
        
        ## 🛠 Corrections de Bugs
        * **Migration APPDATA :** Sécurisation de la Base de Données dans \`%LOCALAPPDATA%\`. Vous ne perdrez plus jamais vos mots de passe.
        * **Réparation du Lecteur Vidéo :** L'erreur de l'argument \`--player\` qui faisait crasher PyQtMultimedia a été corrigée.
        "@
        Set-Content -Path release_notes.md -Value $notes -Encoding UTF8

    - name: 🌐 Publication de la Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        name: OmniScreen Mise à jour v${{ env.VERSION }}
        body_path: release_notes.md
        files: InstallerFinal/OmniScreen_Setup_v3.0.3.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
